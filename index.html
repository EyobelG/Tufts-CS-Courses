<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tufts CS Curriculum DAG</title>
    
    <script src="https://unpkg.com/cytoscape@3.27.0/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Tufts CS Curriculum Pathways</h1>
    </header>

    <div id="legend-container">
        <div id="legend-content">
            <b>Legend</b><br>
            <span class="dot core"></span> Blue = Core<br>
            <span class="dot math"></span> Brown = Math<br>
            <span class="dot elect"></span> Tan = Electives<br>
            <span class="dot opt"></span> Grey = Optional<br>
            <hr>
            <small>Hover to reveal legend<br>Click nodes to explore</small>
            <button id="reset-btn">Reset View</button>
        </div>
    </div>

    <div id="info-panel">
        <h3 id="course-title">Select a Course</h3>
        <p id="course-desc">Click on any node to see its prerequisites and subsequent pathways.</p>
    </div>

    <div id="cy"></div>

    <script src="script.js"></script>
</body>
</html>
